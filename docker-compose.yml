# 一键启动：docker compose up --build -d
# 或运行 scripts/docker-start.ps1 / scripts/docker-start.sh

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  rag_service:
    build:
      context: ./rag_service
    expose:
      - "8000"
    # 仅本地调试 Python RAG 时取消注释（生产环境经 Node 8080 代理，勿暴露 8000）
    # ports:
    #   - "8000:8000"
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      VECTOR_MODEL: ${VECTOR_MODEL:-text-embedding-v4}
      TZ: Asia/Shanghai
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/rag/health', timeout=5)",
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
      QDRANT_URL: http://qdrant:6333
      QDRANT_AUTO_RECREATE: "true"
      RAG_SERVICE_URL: http://rag_service:8000
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DB_PATH: /data/database.sqlite
      DB_SEED_ON_STARTUP: "true"
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      TZ: Asia/Shanghai
      APP_TIMEZONE: Asia/Shanghai
    volumes:
      - server_data:/data
    depends_on:
      qdrant:
        condition: service_healthy
      rag_service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      # 浏览器访问必须用 localhost，不能用 Docker 内部服务名
      VITE_API_BASE: http://localhost:8080
      CHOKIDAR_USEPOLLING: "1"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_storage:
  server_data:
